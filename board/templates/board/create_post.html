{% extends 'board/base.html' %}
{% block content %}
<div class="w3-container w3-white w3-card w3-round w3-margin w3-padding-large">
    <h3>Write a Birthday Wish 🎂</h3>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w3-button w3-pink w3-round">Post to Board</button>
        <a href="{% url 'home' %}" class="w3-button w3-light-grey w3-round">Cancel</a>
    </form>
</div>
{% endblock %}
