<!DOCTYPE html>
<html>
<title>Marvin's Birthday Board</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Karma">
<style>body,h1,h2,h3,h4,h5,h6 {font-family: "Karma", sans-serif}</style>

<body class="w3-light-grey">

<div class="w3-bar w3-pink w3-card w3-padding">
  <a href="{% url 'home' %}" class="w3-bar-item w3-button w3-wide">🎂 B-DAY BOARD</a>
  <div class="w3-right">
    {% if user.is_authenticated %}
      <span class="w3-bar-item">Hello, <b>{{ user.username }}</b></span>
      <form action="{% url 'logout' %}" method="post" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="w3-bar-item w3-button">Logout</button>
      </form>
    {% else %}
      <a href="{% url 'login' %}" class="w3-bar-item w3-button">Login</a>
      <a href="{% url 'register' %}" class="w3-bar-item w3-button">Sign Up</a>
    {% endif %}
  </div>
</div>

<div class="w3-content" style="max-width:1100px;margin-top:20px">
  {% block content %}{% endblock %}
</div>

</body>
</html>
